<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云栖灵宠图鉴：帕洛斯序章</title>
  <style>
    :root {
      --ink: #252a32;
      --muted: #687281;
      --paper: #fffaf4;
      --panel: rgba(255, 255, 255, .82);
      --line: rgba(37, 42, 50, .14);
      --skin: #f4c8b8;
      --hair: #b3886f;
      --hoodie: #f7f6f4;
      --bear: #e6c08a;
      --gold: #ffc85a;
      --sky: #7ebce8;
      --mint: #71bea8;
      --rose: #ef8d86;
      --moon: #8d83c9;
      --shadow: rgba(34, 48, 68, .18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(126, 188, 232, .34), transparent 30%),
        radial-gradient(circle at 86% 16%, rgba(239, 141, 134, .22), transparent 28%),
        linear-gradient(145deg, #fff9f1 0%, #eaf7fb 48%, #fff1e8 100%);
      font-family: ui-rounded, "SF Pro Rounded", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(8px, 1.8vw, 22px);
    }

    .app {
      width: min(1240px, 100%);
      height: min(780px, 100%);
      min-height: 590px;
      display: grid;
      grid-template-rows: 56px 1fr 64px;
      gap: 10px;
    }

    .top,
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 950;
      white-space: nowrap;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 46%, #fff 0 17%, transparent 18%),
        conic-gradient(from 210deg, var(--rose), var(--gold), var(--sky), var(--mint), var(--rose));
      box-shadow: inset 0 0 0 7px rgba(255,255,255,.34), 0 10px 26px var(--shadow);
      flex: 0 0 auto;
    }

    .stats,
    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .pill {
      height: 40px;
      min-width: 84px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.74);
      box-shadow: 0 8px 22px rgba(45, 59, 74, .08);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.78);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(45, 59, 74, .08);
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(37, 42, 50, .24);
    }

    button:active {
      transform: translateY(1px);
    }

    .nav button {
      height: 42px;
      padding: 0 15px;
    }

    button[data-active="true"] {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #ef8d86, #8d83c9);
    }

    .game {
      position: relative;
      overflow: hidden;
      min-height: 0;
      border: 1px solid rgba(37, 42, 50, .13);
      border-radius: 14px;
      background: #fffaf4;
      box-shadow: 0 28px 80px rgba(40, 55, 72, .2);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .message {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: min(520px, calc(100% - 36px));
      min-height: 96px;
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border: 4px solid #2f3742;
      border-radius: 0;
      background: #fffaf4;
      box-shadow: inset 0 0 0 4px #d9e5ef, 0 12px 0 rgba(37,42,50,.12);
      font-weight: 850;
      line-height: 1.45;
      pointer-events: none;
    }

    .message[hidden],
    .battle-menu[hidden] {
      display: none;
    }

    .battle-menu {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: min(520px, calc(100% - 36px));
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0;
      padding: 10px;
      border: 4px solid #2f3742;
      background: #fffaf4;
      box-shadow: inset 0 0 0 4px #d9e5ef, 0 12px 0 rgba(37,42,50,.12);
    }

    .battle-menu button {
      min-height: 48px;
      padding: 8px 14px 8px 28px;
      text-align: left;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      line-height: 1.15;
      position: relative;
    }

    .battle-menu button::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 20px;
      width: 0;
      height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 9px solid #2f3742;
      opacity: 0;
    }

    .battle-menu button:hover::before {
      opacity: 1;
    }

    .battle-menu small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-weight: 800;
    }

    .mobile-controls {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: none;
    }

    .mobile-controls[hidden] {
      display: none !important;
    }

    .dpad {
      position: absolute;
      left: 16px;
      bottom: 16px;
      width: 132px;
      height: 132px;
      display: grid;
      grid-template: repeat(3, 44px) / repeat(3, 44px);
    }

    .touch-button {
      width: 42px;
      height: 42px;
      padding: 0;
      border: 2px solid rgba(255,255,255,.85);
      border-radius: 50%;
      background: rgba(37,42,50,.72);
      color: #fff;
      box-shadow: 0 5px 14px rgba(25,34,43,.28);
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      font-size: 22px;
      line-height: 1;
    }

    .touch-button[data-key="ArrowUp"] { grid-area: 1 / 2; }
    .touch-button[data-key="ArrowLeft"] { grid-area: 2 / 1; }
    .touch-button[data-key="ArrowDown"] { grid-area: 3 / 2; }
    .touch-button[data-key="ArrowRight"] { grid-area: 2 / 3; }

    .touch-action {
      position: absolute;
      right: 24px;
      bottom: 38px;
      width: 64px;
      height: 64px;
      background: rgba(239,141,134,.9);
      font-size: 24px;
    }

    .hint {
      color: var(--muted);
      font-weight: 850;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      body {
        padding: 6px;
      }

      .app {
        height: 100%;
        min-height: 0;
        grid-template-rows: 50px 1fr 56px;
        gap: 6px;
      }

      .brand span:last-child {
        max-width: 43vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .pill {
        min-width: 58px;
        padding: 0 8px;
      }

      .nav button {
        height: 38px;
        padding: 0 10px;
      }

      .battle-menu {
        grid-template-columns: 1fr;
        bottom: 10px;
        right: 10px;
        width: calc(100% - 20px);
      }

      .message {
        left: 10px;
        bottom: 252px;
        width: calc(100% - 20px);
        min-height: 60px;
      }
    }

    @media (pointer: coarse), (max-width: 900px) {
      .mobile-controls:not([hidden]) {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="云栖灵宠图鉴：帕洛斯序章">
    <header class="top">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>云栖灵宠图鉴</span>
      </div>
      <div class="stats" aria-live="polite">
        <div class="pill">捕捉球 <span id="stickers">10</span></div>
        <div class="pill">图鉴 <span id="dexCount">1/6</span></div>
        <div class="pill">灵晶 <span id="candy">3</span></div>
      </div>
    </header>

    <section class="game" id="gameShell">
      <canvas id="game" width="1120" height="640"></canvas>
      <div class="message" id="message">在中心都市·晴风城调查地点、收集物资，并寻找灵宠伙伴。</div>
      <div class="battle-menu" id="battleMenu" hidden>
        <button data-action="attack">属性招式 <small>造成伤害，打出克制策略</small></button>
        <button data-action="soothe">伙伴安抚 <small>提高亲密，更容易捕捉</small></button>
        <button data-action="bear">伙伴守护 <small>恢复体力并降低警觉</small></button>
        <button data-action="capture">基础捕捉球 <small>尝试收录到灵宠图鉴</small></button>
      </div>
      <div class="mobile-controls" id="mobileControls" aria-label="触控操作">
        <div class="dpad" aria-label="移动方向">
          <button class="touch-button" data-key="ArrowUp" aria-label="向上">↑</button>
          <button class="touch-button" data-key="ArrowLeft" aria-label="向左">←</button>
          <button class="touch-button" data-key="ArrowDown" aria-label="向下">↓</button>
          <button class="touch-button" data-key="ArrowRight" aria-label="向右">→</button>
        </div>
        <button class="touch-button touch-action" id="touchAction" aria-label="互动">●</button>
      </div>
    </section>

    <footer class="bottom">
      <div class="nav">
        <button id="mapTab" data-active="true">地图</button>
        <button id="dexTab">图鉴</button>
        <button id="partyTab">队伍</button>
        <button id="homeTab">研究所</button>
      </div>
      <div class="hint" id="hint">方向键/WASD 移动；进入高草丛后移动会随机遇敌</div>
    </footer>
  </main>

      city: { name: "中心都市·晴风城", bounds: { minX: TILE, maxX: W - TILE, minY: TILE, maxY: WORLD_H - TILE } },
      forest: { name: "晨曦森林", bounds: { minX: TILE, maxX: W - TILE, minY: TILE, maxY: WORLD_H - TILE } }
    };

    function makeGrid(fill = "grass") {
      return Array.from({ length: MAP_ROWS }, () => Array(MAP_COLS).fill(fill));
    }

    function fillTiles(grid, x1, y1, x2, y2, tile) {
      for (let y = y1; y <= y2; y++) for (let x = x1; x <= x2; x++) {
        if (grid[y] && grid[y][x] !== undefined) grid[y][x] = tile;
      }
    }

    function buildCityGrid() {
      const g = makeGrid();
      fillTiles(g, 0, 0, 34, 0, "tree");
      fillTiles(g, 0, 29, 34, 29, "tree");
      fillTiles(g, 0, 0, 0, 29, "tree");
      fillTiles(g, 34, 0, 34, 29, "tree");
      fillTiles(g, 16, 0, 18, 29, "path");
      fillTiles(g, 8, 13, 26, 18, "path");
      fillTiles(g, 4, 3, 13, 8, "tall");
      fillTiles(g, 21, 3, 30, 8, "tall");
      fillTiles(g, 3, 10, 9, 13, "building");
      fillTiles(g, 25, 10, 31, 13, "building");
      fillTiles(g, 5, 20, 13, 23, "water");
      fillTiles(g, 21, 20, 29, 23, "water");
      fillTiles(g, 16, 20, 18, 23, "path");
      fillTiles(g, 4, 26, 30, 28, "path");
      fillTiles(g, 16, 0, 18, 1, "path");
      return g;
    }

    function buildForestGrid() {
      const g = makeGrid("grass");
      fillTiles(g, 0, 0, 34, 0, "tree");
      fillTiles(g, 0, 29, 34, 29, "tree");
      fillTiles(g, 0, 0, 0, 29, "tree");
      fillTiles(g, 34, 0, 34, 29, "tree");
      fillTiles(g, 16, 0, 18, 29, "path");
      fillTiles(g, 13, 8, 18, 10, "path");
      fillTiles(g, 13, 10, 15, 19, "path");
      fillTiles(g, 13, 17, 21, 20, "path");
      fillTiles(g, 19, 20, 21, 29, "path");
      fillTiles(g, 2, 3, 12, 9, "tall");
      fillTiles(g, 22, 3, 32, 9, "tall");
      fillTiles(g, 2, 11, 12, 18, "tall");
      fillTiles(g, 22, 11, 32, 18, "tall");
      fillTiles(g, 2, 20, 12, 27, "tall");
      fillTiles(g, 22, 20, 32, 27, "tall");
      fillTiles(g, 4, 5, 9, 9, "water");
      fillTiles(g, 25, 13, 30, 17, "water");
      fillTiles(g, 2, 15, 5, 17, "rock");
      fillTiles(g, 7, 13, 9, 16, "tree");
      fillTiles(g, 26, 22, 29, 25, "tree");
      fillTiles(g, 16, 0, 18, 1, "path");
      fillTiles(g, 19, 28, 21, 29, "path");
      return g;
    }

    const worldMaps = { city: buildCityGrid(), forest: buildForestGrid() };

    const state = {
      mode: "map",
      mapRegion: "city",
      regionCooldown: 0,
      time: 0,
      keys: new Set(),
      player: { x: 560, y: 608, tx: 560, ty: 608, step: 0, dir: "down", moving: false },
      stickers: 10,
      candy: 3,
      captured: new Set(["bear"]),
      party: ["bear"],
      selectedDex: 0,
      messageTimer: 0,
      encounterClock: 0,
      battle: null,
      particles: [],
      transition: 0
    };

    function fitCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function mon(id) {
      return mons.find(m => m.id === id);
    }

    function type(id) {
      return typeData[id];
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function setMessage(text, seconds = 2.6) {
      message.textContent = text;
      message.hidden = false;
      state.messageTimer = seconds;
    }

    function interactMap() {
      if (state.mode !== "map") return;
      setMessage(isInTallGrass() ? "草叶正在沙沙作响，继续移动可能遇见野生灵宠。" : "附近没有可互动的目标。", 1.6);
    }

    function updateUI() {
      stickersEl.textContent = String(state.stickers);
      candyEl.textContent = String(state.candy);
      dexCountEl.textContent = `${state.captured.size}/${mons.length}`;
    }

    function setMode(mode) {
      state.mode = mode;
      battleMenu.hidden = mode !== "battle";
      mobileControls.hidden = mode !== "map";
      Object.keys(tabs).forEach(key => tabs[key].dataset.active = String(key === mode));
      hintEl.textContent = {
        map: "方向键/WASD 移动；只有在高草丛中移动才会随机遇敌",
        dex: "图鉴记录已发现的灵宠、属性与生态资料",
        party: "队伍用于出战，后续可扩展换队和升级",
        home: "帕洛斯研究所可补充捕捉球、灵晶与调查任务",
        battle: "选择行动：属性招式、安抚、守护或捕捉"
      }[mode];
      if (mode !== "battle") state.battle = null;
      if (mode === "map") {
        setMessage(state.mapRegion === "forest"
          ? "晨曦森林生态丰富。调查湖泊、花海、古树和隐秘洞穴，记录新的灵宠。"
          : "探索中心都市·晴风城，从北门出城口进入晨曦森林。");
      }
      if (mode === "dex") setMessage("云栖灵宠图鉴记录每一只伙伴的属性、栖息地与成长线索。");
      if (mode === "party") setMessage("当前队伍由小火龙带队，捕捉成功的宠物会自动加入。");
      if (mode === "home") {
        state.stickers = Math.max(state.stickers, 10);
        state.candy = Math.max(state.candy, 3);
        updateUI();
        setMessage("回到帕洛斯研究所，捕捉球与灵晶已经补充完毕。");
      }
    }

    function currentZone() {
      return regionZones[state.mapRegion].find(z =>
        state.player.x >= z.x1 && state.player.x <= z.x2 && state.player.y >= z.y1 && state.player.y <= z.y2
      );
    }

    function tileAt(x, y) {
      const col = clamp(Math.floor(x / TILE), 0, MAP_COLS - 1);
      const row = clamp(Math.floor(y / TILE), 0, MAP_ROWS - 1);
      return worldMaps[state.mapRegion][row][col];
    }

    function isWalkable(x, y) {
      const samples = [[-11, -8], [11, -8], [-11, 12], [11, 12]];
      if (state.mapRegion === "city") {
        if (Math.hypot(x - 560, y - 520) < 68) return false;
        if (x > 48 && x < 392 && y > 240 && y < 480) return false;
        if (x > 728 && x < 1072 && y > 250 && y < 480) return false;
      }
      return samples.every(([ox, oy]) => !["tree", "water", "building", "rock"].includes(tileAt(x + ox, y + oy)));
    }

    function isInTallGrass() {
      return tileAt(state.player.x, state.player.y + 8) === "tall";
    }

    function recoverPlayerIfBlocked() {
      if (isWalkable(state.player.x, state.player.y)) return;
      const fallback = state.mapRegion === "city" ? { x: 560, y: 608 } : { x: 656, y: 900 };
      Object.assign(state.player, { x: fallback.x, y: fallback.y, tx: fallback.x, ty: fallback.y, moving: false });
    }

    function switchMapRegion(region) {
      state.mapRegion = region;
      state.regionCooldown = 1.2;
      state.encounterClock = 0;
      const spawn = region === "forest" ? { x: 656, y: 900, dir: "up" } : { x: 560, y: 104, dir: "down" };
      Object.assign(state.player, { x: spawn.x, y: spawn.y, tx: spawn.x, ty: spawn.y, dir: spawn.dir, moving: false });
      state.transition = 1;
      hintEl.textContent = region === "forest"
        ? "探索晨曦森林；南侧返回晴风城，北侧通往后续区域"
        : "探索晴风城；前往北门出城口进入晨曦森林";
      setMessage(region === "forest"
        ? "抵达晨曦森林。沿主路深入，探索九处生态地点。"
        : "返回中心都市·晴风城。研究所已经记录本次森林调查。", 3.2);
    }

    function checkRegionTransition() {
      if (state.regionCooldown > 0) return;
      if (state.mapRegion === "city" && state.player.y < 48 && Math.abs(state.player.x - 560) < 52) {
        switchMapRegion("forest");
      } else if (state.mapRegion === "forest" && state.player.y > 912 && Math.abs(state.player.x - 656) < 52) {
        switchMapRegion("city");
      } else if (state.mapRegion === "forest" && state.player.y < 48 && Math.abs(state.player.x - 560) < 52) {
        state.regionCooldown = 2;
        setMessage("通往焰岩山的北侧道路将在下一片探索区域开放。", 2.6);
      }
    }

    function startEncounter() {
      if (state.mode !== "map") return;
      const z = currentZone();
      if (!z || !isInTallGrass()) return;
      const pool = z ? z.pool : mons.filter(m => m.id !== "bear").map(m => m.id);
      const enemy = structuredClone(mon(pool[Math.floor(Math.random() * pool.length)]));
      enemy.level += Math.floor(rand(0, 3));
      enemy.maxHp += enemy.level * 3;
      enemy.hp = enemy.maxHp;
      enemy.alert = 68;
      enemy.bond = 12;
      const ally = structuredClone(mon(state.party[0]));
      ally.hp = ally.maxHp;
      state.battle = {
        ally,
        enemy,
        zone: z ? z.name : mapRegions[state.mapRegion].name,
        phase: "player",
        flash: 0,
        shake: 0,
        capturePulse: 0
      };
      state.transition = 1;
      setMode("battle");
      setMessage(`${state.battle.zone}里出现了 ${enemy.name}！`);
    }

    function battleAction(action) {
      const b = state.battle;
      if (!b || b.phase !== "player") return;
      const e = b.enemy;
      const a = b.ally;
      if (action === "attack") {
        const damage = Math.floor(rand(8, 13) + a.power);
        e.hp = clamp(e.hp - damage, 1, e.maxHp);
        e.alert = clamp(e.alert - 10, 0, 100);
        b.flash = .8;
        b.shake = .9;
        burst(790, 260, type(a.type).a, 28);
        setMessage(`${a.name} 发动属性招式，${e.name} 的体力与警觉降低了。`, 1.5);
      }
      if (action === "soothe") {
        e.bond = clamp(e.bond + 24, 0, 100);
        e.alert = clamp(e.alert - 15, 0, 100);
        e.hp = clamp(e.hp - 6, 1, e.maxHp);
        burst(790, 260, "#9edcff", 32);
        setMessage(`训练师耐心安抚 ${e.name}，伙伴亲密值上升。`, 1.5);
      }
      if (action === "bear") {
        a.hp = clamp(a.hp + 12, 0, a.maxHp);
        e.alert = clamp(e.alert - 18, 0, 100);
        e.bond = clamp(e.bond + 10, 0, 100);
        burst(300, 380, "#ffc85a", 38);
        setMessage(`${a.name} 展开伙伴守护，恢复体力并让对方放松下来。`, 1.5);
      }
      if (action === "capture") {
        tryCapture();
        return;
      }
      b.phase = "enemy";
      setTimeout(enemyTurn, 780);
    }

    function tryCapture() {
      const b = state.battle;
      const e = b.enemy;
      if (state.stickers <= 0) {
        setMessage("基础捕捉球用完了，回帕洛斯研究所补充后再来。");
        return;
      }
      state.stickers -= 1;
      updateUI();
      b.capturePulse = 1;
      burst(790, 260, "#ffc85a", 52);
      const hpFactor = 1 - e.hp / e.maxHp;
      const chance = clamp(.22 + hpFactor * .36 + (100 - e.alert) * .0035 + e.bond * .0042, .18, .9);
      if (Math.random() < chance) {
        state.captured.add(e.id);
        if (!state.party.includes(e.id) && state.party.length < 3) state.party.push(e.id);
        updateUI();
        setMessage(`${e.name} 成为了新的伙伴，生态资料已收入图鉴！`, 2.4);
        setTimeout(() => setMode("map"), 1350);
      } else {
        e.alert = clamp(e.alert + 9, 0, 100);
        setMessage(`${e.name} 挣脱了捕捉球，再安抚一下会更容易。`, 1.6);
        b.phase = "enemy";
        setTimeout(enemyTurn, 900);
      }
    }

    function enemyTurn() {
      const b = state.battle;
      if (!b || b.phase !== "enemy") return;
      const e = b.enemy;
      const a = b.ally;
      const damage = Math.floor(rand(5, 10) + e.power * .45);
      a.hp = clamp(a.hp - damage, 0, a.maxHp);
      b.shake = 1;
      burst(318, 384, type(e.type).a, 20);
      if (a.hp <= 0) {
        setMessage(`${a.name} 体力不足，先回研究所治疗。`);
        setTimeout(() => setMode("home"), 1150);
      } else {
        setMessage(`${e.name} 发动了试探攻击，${a.name} 坚持住了。`, 1.4);
        b.phase = "player";
      }
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        state.particles.push({
          x,
          y,
          vx: rand(-120, 120),
          vy: rand(-150, 70),
          life: rand(.45, .9),
          max: rand(.45, .9),
          r: rand(2, 5),
          color
        });
      }
    }

    function step(dt) {
      state.time += dt;
      state.transition = Math.max(0, state.transition - dt * 1.8);
      state.regionCooldown = Math.max(0, state.regionCooldown - dt);
      if (state.messageTimer > 0) {
        state.messageTimer -= dt;
        if (state.messageTimer <= 0 && state.mode !== "battle") message.hidden = true;
      }
      for (const p of state.particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 180 * dt;
        p.life -= dt;
      }
      state.particles = state.particles.filter(p => p.life > 0);

      if (state.mode === "map") {
        recoverPlayerIfBlocked();
        let dx = 0;
        let dy = 0;
        if (state.keys.has("ArrowLeft") || state.keys.has("a") || state.keys.has("A")) dx -= 1;
        if (state.keys.has("ArrowRight") || state.keys.has("d") || state.keys.has("D")) dx += 1;
        if (state.keys.has("ArrowUp") || state.keys.has("w") || state.keys.has("W")) dy -= 1;
        if (state.keys.has("ArrowDown") || state.keys.has("s") || state.keys.has("S")) dy += 1;
        if (dx || dy) {
          const len = Math.hypot(dx, dy);
          const bounds = mapRegions[state.mapRegion].bounds;
          const nx = clamp(state.player.x + dx / len * 150 * dt, bounds.minX, bounds.maxX);
          const ny = clamp(state.player.y + dy / len * 150 * dt, bounds.minY, bounds.maxY);
          if (isWalkable(nx, state.player.y)) state.player.x = nx;
          if (isWalkable(state.player.x, ny)) state.player.y = ny;
          state.player.tx = state.player.x;
          state.player.ty = state.player.y;
          state.player.step += dt;
          state.player.moving = true;
          state.player.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up");
        } else {
          state.player.moving = Math.hypot(state.player.tx - state.player.x, state.player.ty - state.player.y) > 2;
        }
        const nextX = state.player.x + (state.player.tx - state.player.x) * Math.min(1, dt * 11);
        const nextY = state.player.y + (state.player.ty - state.player.y) * Math.min(1, dt * 11);
        if (isWalkable(nextX, state.player.y)) state.player.x = nextX;
        else state.player.tx = state.player.x;
        if (isWalkable(state.player.x, nextY)) state.player.y = nextY;
        else state.player.ty = state.player.y;
        checkRegionTransition();
        if (state.player.moving && isInTallGrass()) state.encounterClock += dt;
        else state.encounterClock = 0;
        if (currentZone() && isInTallGrass() && state.encounterClock > .7 && Math.random() < dt * .78) {
          state.encounterClock = 0;
          startEncounter();
        }
      }

      if (state.battle) {
        state.battle.flash = Math.max(0, state.battle.flash - dt * 2.6);
        state.battle.shake = Math.max(0, state.battle.shake - dt * 3.2);
        state.battle.capturePulse = Math.max(0, state.battle.capturePulse - dt * 1.4);
      }
    }

    function draw() {
      if (state.mode === "map") drawMap();
      if (state.mode === "battle") drawBattle();
      if (state.mode === "dex") drawDex();
      if (state.mode === "party") drawParty();
      if (state.mode === "home") drawHome();
      drawParticles();
      if (state.transition > 0) {
        ctx.fillStyle = `rgba(255, 250, 244, ${state.transition * .55})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawBackdrop() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#dff3ff");
      g.addColorStop(.48, "#fbfdff");
      g.addColorStop(1, "#fff1e5");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 9; i++) {
        drawCloud((i * 166 - state.time * 13) % 1280 - 90, 74 + Math.sin(i * 1.7 + state.time * .45) * 18, 1 + (i % 3) * .16);
      }
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = "rgba(255,255,255,.62)";
      ctx.beginPath();
      ctx.ellipse(0, 16, 46, 18, 0, 0, Math.PI * 2);
      ctx.ellipse(-31, 18, 25, 15, 0, 0, Math.PI * 2);
      ctx.ellipse(31, 14, 29, 18, 0, 0, Math.PI * 2);
      ctx.ellipse(2, 2, 31, 23, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function getMapView() {
      const region = mapRegions[state.mapRegion];
      const cameraY = clamp(state.player.y - H * .56, 0, WORLD_H - H);
      return { region, scale: 1, sourceH: H, cameraY };
    }

    function drawMap() {
      const view = getMapView();
      drawOverworld(view.cameraY);
      const screenX = state.player.x;
      const screenY = state.player.y - view.cameraY;
      drawTrainerToken(screenX, screenY, .74);
      if (isInTallGrass()) drawGrassForeground(screenX, screenY);
      drawExplorationHud();
    }

    function drawOverworld(cameraY = 0) {
      ctx.fillStyle = "#8fce70";
      ctx.fillRect(0, 0, W, H);
      const grid = worldMaps[state.mapRegion];
      const firstRow = Math.max(0, Math.floor(cameraY / TILE));
      const lastRow = Math.min(MAP_ROWS - 1, Math.ceil((cameraY + H) / TILE));
      for (let row = firstRow; row <= lastRow; row++) {
        for (let col = 0; col < MAP_COLS; col++) {
          drawOverworldTile(grid[row][col], col * TILE, row * TILE - cameraY, col, row);
        }
      }
      drawRegionLandmarks(cameraY);
    }

    function drawOverworldTile(tile, x, y, col, row) {
      const alt = (col + row) % 2;
      if (tile === "grass" || tile === "tall" || tile === "tree") {
        ctx.fillStyle = alt ? "#9bda78" : "#91d16f";
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = "rgba(55,116,51,.16)";
        ctx.fillRect(x + 5, y + 24, 12, 2);
        if ((col * 17 + row * 11) % 29 === 0 && tile === "grass") {
          if (mapFlowers.complete && mapFlowers.naturalWidth) ctx.drawImage(mapFlowers, x + 9, y + 7, 24, 18);
        }
      }
      if (tile === "path") {
        ctx.fillStyle = alt ? "#e9cd91" : "#f0d9a3";
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = "rgba(133,91,49,.14)";
        ctx.fillRect(x + 5, y + 8, 3, 2);
        ctx.fillRect(x + 20, y + 24, 7, 2);
      }
      if (tile === "tall") {
        if (mapTallGrass.complete && mapTallGrass.naturalWidth) ctx.drawImage(mapTallGrass, x - 4, y + 2, 40, 29);
      }
      if (tile === "water") {
        ctx.fillStyle = alt ? "#58add8" : "#64b8df";
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = "rgba(28,107,158,.18)";
        ctx.fillRect(x, y + 28, TILE, 4);
        ctx.strokeStyle = "rgba(255,255,255,.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + 4, y + 12 + Math.sin(state.time * 3 + col) * 2);
        ctx.quadraticCurveTo(x + 14, y + 7, x + 27, y + 12);
        ctx.stroke();
      }
      if (tile === "building") {
        ctx.fillStyle = "#e9e3d8";
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = row % 4 < 2 ? "#648fc0" : "#527caf";
        ctx.fillRect(x, y, TILE, 10);
        ctx.strokeStyle = "rgba(47,55,66,.22)";
        ctx.strokeRect(x, y, TILE, TILE);
      }
      if (tile === "rock") {
        ctx.fillStyle = alt ? "#9bda78" : "#91d16f";
        ctx.fillRect(x, y, TILE, TILE);
        if (mapRocks.complete && mapRocks.naturalWidth) ctx.drawImage(mapRocks, x - 7, y - 6, 46, 40);
      }
      if (tile === "tree") {
        ctx.fillStyle = "rgba(33,67,37,.2)";
        ctx.beginPath();
        ctx.ellipse(x + 16, y + 28, 18, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        if (mapTree.complete && mapTree.naturalWidth) ctx.drawImage(mapTree, x - 12, y - 34, 56, 63);
      }
    }

    function drawGrassForeground(x, y) {
      ctx.save();
      if (mapTallGrass.complete && mapTallGrass.naturalWidth) {
        ctx.globalAlpha = .92;
        ctx.drawImage(mapTallGrass, x - 37, y - 1, 74, 52);
      }
      ctx.restore();
    }

    function drawRegionLandmarks(cameraY) {
      ctx.save();
      ctx.translate(0, -cameraY);
      if (state.mapRegion === "city") drawCityLandmarks();
      else drawForestLandmarks();
      ctx.restore();
    }

    function drawCityLandmarks() {
      drawBuildingAsset(researchBuilding, 20, 135, 400, 363);
      drawBuildingAsset(shopBuilding, 700, 178, 400, 320);
      drawFountain(560, 520);

      [[448, 448], [672, 448], [448, 592], [672, 592], [480, 816], [640, 816]].forEach(([x, y]) => drawLamp(x, y));

    function drawTallGrass(z, index) {
      const left = z.x - z.rx;
      const top = z.y - z.ry;
      const cols = Math.floor((z.rx * 2) / 24);
      const rows = Math.floor((z.ry * 2) / 22);
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const gx = left + col * 24 + 12;
          const gy = top + row * 22 + 16;
          const sway = Math.sin(state.time * 3 + col + row + index) * 2;
          ctx.fillStyle = row % 2 ? "#48b768" : "#3fa75d";
          ctx.beginPath();
          ctx.moveTo(gx - 11, gy + 6);
          ctx.quadraticCurveTo(gx - 8 + sway, gy - 10, gx - 2, gy + 6);
          ctx.quadraticCurveTo(gx + sway, gy - 14, gx + 6, gy + 6);
          ctx.quadraticCurveTo(gx + 10 + sway, gy - 8, gx + 13, gy + 6);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.fillStyle = "rgba(37,42,50,.72)";
      ctx.font = "900 17px ui-rounded, system-ui";
      ctx.textAlign = "center";
      ctx.fillText(z.name, z.x, z.y + z.ry + 28);
    }

    function prepareProtagonistCutout() {
      if (!protagonist.complete || !protagonist.naturalWidth || protagonistCutout) return;

      off.height = protagonist.naturalHeight;
      const offCtx = off.getContext("2d");
      offCtx.drawImage(protagonist, 0, 0);
      const img = offCtx.getImageData(0, 0, off.width, off.height);
      const data = img.data;
      const seen = new Uint8Array(off.width * off.height);
      const queue = new Int32Array(off.width * off.height);
      let head = 0;
      let tail = 0;
      const add = (p) => {
        if (seen[p]) return;
        const i = p * 4;
        const max = Math.max(data[i], data[i + 1], data[i + 2]);
        const min = Math.min(data[i], data[i + 1], data[i + 2]);
        if ((data[i] + data[i + 1] + data[i + 2]) / 3 < 222 || max - min > 28) return;
        seen[p] = 1;
        queue[tail++] = p;
      };
      for (let x = 0; x < off.width; x++) {
        add(x);
        add((off.height - 1) * off.width + x);
      }
      for (let y = 0; y < off.height; y++) {
        add(y * off.width);
        add(y * off.width + off.width - 1);
      }
      while (head < tail) {
        const p = queue[head++];
        const x = p % off.width;
        const y = (p / off.width) | 0;
        data[p * 4 + 3] = 0;
        if (x) add(p - 1);
        if (x + 1 < off.width) add(p + 1);
        if (y) add(p - off.width);
        if (y + 1 < off.height) add(p + off.width);
      }
      offCtx.putImageData(img, 0, 0);
      protagonistCutout = off;
    }

      ctx.fillStyle = "#fff3df";
      ctx.beginPath(); ctx.ellipse(0, -29, 16, 11, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#17191f";
      ctx.beginPath(); ctx.ellipse(0, -33, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawSparkFox() {
      base("#ffd35c", "#b88323", "#fff4bd");
      ctx.beginPath(); ctx.ellipse(0, 11, 50, 39, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); shine();
      ctx.beginPath(); ctx.ellipse(0, -35, 39, 35, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      [-30, 30].forEach(ex => {
        ctx.fillStyle = bodyGrad("#ffd35c", "#fff4bd", "#b88323", ex, -80, 58);
        ctx.beginPath(); ctx.moveTo(ex, -54); ctx.lineTo(ex * 1.55, -96); ctx.lineTo(ex * .4, -70); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#fff2ae";
        ctx.beginPath(); ctx.moveTo(ex, -63); ctx.lineTo(ex * 1.22, -82); ctx.lineTo(ex * .62, -70); ctx.closePath(); ctx.fill();
      });
      ctx.fillStyle = bodyGrad("#f8c344", "#fff0aa", "#a87320", 64, -32, 88);
      ctx.beginPath(); ctx.moveTo(40, 8); ctx.quadraticCurveTo(88, -24, 58, -58); ctx.quadraticCurveTo(99, -43, 94, -2); ctx.quadraticCurveTo(84, 38, 40, 32); ctx.fill(); ctx.stroke();
      drawStar(70, -8, 18, "#fff6c8", 0);
      eyes(6.6); cheeks(-6);
      ctx.strokeStyle = "#7b5620"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-8, -4); ctx.quadraticCurveTo(0, 3, 8, -4); ctx.stroke();
    }

    function drawBubbleTurtle() {
      base("#7ebce8", "#397eb5", "#dff6ff");
      ctx.beginPath(); ctx.ellipse(0, 12, 55, 39, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,.58)";
      ctx.beginPath(); ctx.ellipse(0, 2, 39, 28, 0, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "rgba(57,126,181,.35)"; ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255,.62)";
      ctx.beginPath(); ctx.ellipse(-14, -8, 12, 8, -.45, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = bodyGrad("#9ed2ef", "#e5f8ff", "#397eb5", -12, -48, 70); ctx.strokeStyle = "#397eb5";
      ctx.beginPath(); ctx.ellipse(0, -35, 32, 28, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      [-38, 38].forEach(ex => {
        ctx.fillStyle = bodyGrad("#7ebce8", "#dff6ff", "#397eb5", ex, 28, 36);
        ctx.beginPath(); ctx.ellipse(ex, 34, 18, 10, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      });
      eyes(6); cheeks(-7);
    }

    function drawLeafBunny() {
      base("#71bea8", "#438b72", "#e6fff5");
      ctx.beginPath(); ctx.ellipse(0, 8, 43, 47, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      [-22, 22].forEach(ex => {
        ctx.fillStyle = bodyGrad("#77c8ad", "#e6fff5", "#438b72", ex, -68, 72);
        ctx.beginPath(); ctx.ellipse(ex, -58, 15, 44, ex * .008, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "rgba(67,139,114,.45)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(ex, -88); ctx.quadraticCurveTo(ex * .9, -64, ex * .8, -32); ctx.stroke();
        ctx.strokeStyle = "#438b72"; ctx.lineWidth = 3.5;
      });
      ctx.fillStyle = "#f6fff9";
      ctx.beginPath(); ctx.ellipse(0, 16, 22, 25, 0, 0, Math.PI * 2); ctx.fill();
      shine(); eyes(6.5); cheeks(-5);
      ctx.fillStyle = "#ef8d86";
      ctx.beginPath(); ctx.ellipse(0, -3, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawMilkDragon() {
      base("#f08b72", "#b95843", "#ffe0d2");
      ctx.beginPath(); ctx.ellipse(0, 8, 45, 44, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); shine();
      ctx.beginPath(); ctx.ellipse(0, -38, 34, 31, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#fff4e8";
      [-12, 5, 22].forEach((ex, i) => { ctx.beginPath(); ctx.arc(ex, -70 + i * 3, 12, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = "rgba(255,255,255,.52)";
      ctx.beginPath(); ctx.ellipse(-12, -73, 7, 4, -.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#ffd9bd";
      ctx.beginPath(); ctx.ellipse(-42, 2, 24, 13, -.5, 0, Math.PI * 2); ctx.ellipse(42, 2, 24, 13, .5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      eyes(6.2); cheeks(-7);
      ctx.strokeStyle = "#9a4538"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-7, -4); ctx.quadraticCurveTo(0, 2, 7, -4); ctx.stroke();
    }

    function drawMoonCat() {
      base("#8d83c9", "#57508d", "#eeeaff");
      ctx.beginPath(); ctx.ellipse(0, 9, 43, 43, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      [-24, 24].forEach(ex => {
        ctx.fillStyle = bodyGrad("#8d83c9", "#eeeaff", "#57508d", ex, -64, 66);
        ctx.beginPath(); ctx.moveTo(ex, -38); ctx.lineTo(ex * 1.45, -78); ctx.lineTo(ex * .35, -56); ctx.closePath(); ctx.fill(); ctx.stroke();
      });
      ctx.fillStyle = bodyGrad("#8d83c9", "#eeeaff", "#57508d", 62, -22, 88);
      ctx.beginPath(); ctx.moveTo(36, 18); ctx.quadraticCurveTo(90, -22, 54, -62); ctx.quadraticCurveTo(74, -22, 34, -6); ctx.fill(); ctx.stroke();
      shine(); eyes(6.4); cheeks(-5);
      ctx.strokeStyle = "#fff0a8"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(0, -36, 15, .3, 1.7 * Math.PI); ctx.stroke();
    }

    function drawCaptureAura(x, y, pulse) {
      if (!pulse) return;
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = "#ffc85a";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(x, y - 10, 88 + (1 - pulse) * 50, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / p.max);
        drawStar(p.x, p.y, p.r, p.color, state.time * 4);
        ctx.restore();
      }
    }

    function drawStar(x, y, r, color, rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 5;
        const rr = i % 2 ? r * .45 : r;
        ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function hexToRgba(hex, alpha) {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(.033, (now - last) / 1000);
      last = now;
      step(dt);
      draw();
      requestAnimationFrame(loop);
    }

    shell.addEventListener("pointerdown", event => {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width * W;
      const y = (event.clientY - rect.top) / rect.height * H;
      if (state.mode === "map") {
        const view = getMapView();
        const worldX = x / view.scale;
        const worldY = y / view.scale + view.cameraY;
        const dx = worldX - state.player.x;
        const dy = worldY - state.player.y;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
          state.player.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? "right" : "left") : (dy > 0 ? "down" : "up");
          state.player.moving = true;
        }
        const bounds = mapRegions[state.mapRegion].bounds;
        state.player.tx = clamp(worldX, bounds.minX, bounds.maxX);
        state.player.ty = clamp(worldY, bounds.minY, bounds.maxY);
      }
      if (state.mode === "dex") {
        const column = x >= 300 && x <= 530 ? 1 : x >= 54 && x <= 284 ? 0 : -1;
        const row = Math.floor((y - 102) / 54);
        const withinRow = (y - 102) % 54 <= 44;
        const index = column * 8 + row;
        if (column >= 0 && row >= 0 && row < 8 && withinRow && index < mons.length) state.selectedDex = index;
      }
    });

    mobileControls.addEventListener("pointerdown", event => {
      const button = event.target.closest("[data-key]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      button.setPointerCapture?.(event.pointerId);
      state.keys.add(button.dataset.key);
    });

    ["pointerup", "pointercancel"].forEach(name => {
      mobileControls.addEventListener(name, event => {
        const button = event.target.closest("[data-key]");
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        state.keys.delete(button.dataset.key);
      });
    });

    touchAction.addEventListener("pointerdown", event => {
      event.preventDefault();
      event.stopPropagation();
      interactMap();
    });

    window.addEventListener("keydown", event => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " ", "a", "A", "d", "D", "w", "W", "s", "S"].includes(event.key)) event.preventDefault();
      state.keys.add(event.key);
      if (event.key === " " && state.mode === "map") interactMap();
      if (event.key === "Escape" && state.mode === "battle") setMode("map");
    });
    window.addEventListener("keyup", event => state.keys.delete(event.key));

    battleMenu.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (button) battleAction(button.dataset.action);
    });

    tabs.map.addEventListener("click", () => setMode("map"));
    tabs.dex.addEventListener("click", () => setMode("dex"));
    tabs.party.addEventListener("click", () => setMode("party"));
    tabs.home.addEventListener("click", () => setMode("home"));

    window.addEventListener("resize", () => {
      fitCanvas();
      draw();
    });
    protagonist.addEventListener("load", () => {
      prepareProtagonistCutout();
      draw();
    });
    petLineup.addEventListener("load", () => {
      preparePetLineupCutout();
      draw();
    });
    petLineupExtra.addEventListener("load", () => {
      prepareExtraPetLineupCutout();
      draw();
    });
    researchBuilding.addEventListener("load", draw);
    shopBuilding.addEventListener("load", draw);
    [mapTree, mapRocks, mapTallGrass, mapFlowers].forEach(asset => asset.addEventListener("load", draw));

    fitCanvas();
    updateUI();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
